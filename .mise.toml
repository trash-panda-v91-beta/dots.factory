[env]
_.fnox-env = { tools = true }

[plugins]
fnox-env = "https://github.com/jdx/mise-env-fnox"

[tools]
actionlint = "1.7.11"
fnox = "1.19.0"
hk = "1.36.0"
pkl = "0.30.2"
tombi = "0.7.22"
yamlfmt = "0.21.0"
rumdl = "0.1.66"
yamllint = "1.38.0"

[settings]
env_shell_expand = true

[settings.pipx]
uvx = true

[tasks.check]
description = "Run all checks"
run = [
  "hk check",
  "NIX_CONFIG='access-tokens = github.com=$GH_TOKEN' nix flake check",
]

[tasks.fix]
description = "Run all fixers and formatters"
run = "hk fix"
