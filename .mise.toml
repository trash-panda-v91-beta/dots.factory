[env]
_.fnox-env = { tools = true }

[plugins]
fnox-env = "https://github.com/jdx/mise-env-fnox"

[tools]
actionlint = "1.7.12"
fnox = "1.23.0"
hk = "1.44.2"
pkl = "0.31.1"
tombi = "0.9.26"
yamlfmt = "0.21.0"
rumdl = "0.1.84"
yamllint = "1.38.0"

[settings]
env_shell_expand = true

[settings.pipx]
uvx = true

[tasks.check]
description = "Run all checks"
run = [
  "hk check",
  "nix build .#darwinConfigurations.pmb.system --dry-run",
]

[tasks.fix]
description = "Run all fixers and formatters"
run = "hk fix"

[tasks.build]
description = "Dry-run build for current host"
run = "nh darwin build . -n"

[tasks.switch]
description = "Build and activate current host"
run = "nh darwin switch . --ask"

[tasks.diff]
description = "Show pending changes (diff against current)"
run = "nh darwin build . -n -d always"

[tasks.update]
description = "Update all flake inputs and build"
run = "nh darwin build . -u"
