[env]
_.fnox-env = { tools = true }

[plugins]
fnox-env = "https://github.com/jdx/mise-env-fnox"

[tools]
actionlint = "1.7.12"
fnox = "1.23.0"
hk = "1.44.2"
pkl = "0.31.1"
"github:tombi-toml/tombi" = "0.10.2"
yamlfmt = "0.21.0"
rumdl = "0.1.84"
yamllint = "1.38.0"

[settings]
env_shell_expand = true

[settings.pipx]
uvx = true

[tasks.check]
description = "Run all checks"
run = [
  "hk check",
  "nix build .#darwinConfigurations.pmb.system --dry-run",
]

[tasks.fix]
description = "Run all fixers and formatters"
run = "hk fix"
